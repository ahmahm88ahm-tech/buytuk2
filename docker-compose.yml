version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: socialboost-postgres
    environment:
      POSTGRES_DB: socialboost
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - socialboost-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: socialboost-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - socialboost-network

  # Backend API (NestJS)
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: socialboost-api
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/socialboost
      - REDIS_URL=redis://redis:6379
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    networks:
      - socialboost-network

  # Frontend (Next.js PWA)
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: socialboost-web
    environment:
      - NEXTAUTH_URL=http://localhost:3000
      - API_URL=http://api:3001
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    networks:
      - socialboost-network

  # AI Engine (Python/FastAPI)
  ai-engine:
    build:
      context: ./apps/ai-engine
      dockerfile: Dockerfile
    container_name: socialboost-ai
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TWITTER_API_KEY=${TWITTER_API_KEY}
      - INSTAGRAM_API_KEY=${INSTAGRAM_API_KEY}
      - TIKTOK_API_KEY=${TIKTOK_API_KEY}
      - FACEBOOK_API_KEY=${FACEBOOK_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - ./apps/ai-engine:/app
    networks:
      - socialboost-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: socialboost-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - web
      - api
      - ai-engine
    networks:
      - socialboost-network

  # Redis Commander (Redis Management UI)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: socialboost-redis-ui
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - socialboost-network

  # PgAdmin (PostgreSQL Management UI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: socialboost-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@socialboost.com
      - PGADMIN_DEFAULT_PASSWORD=admin123
    ports:
      - "8080:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - socialboost-network

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:

networks:
  socialboost-network:
    driver: bridge
